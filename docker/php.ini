[PHP]
; File uploads (avatars, reports, etc.)
upload_max_filesize = 20M
post_max_size       = 20M
max_execution_time  = 60
max_input_time      = 60
memory_limit        = 256M

; Don't expose PHP version in headers
expose_php = Off

; Error handling — log only, don't display
display_errors  = Off
log_errors      = On
error_log       = /dev/stderr

[Date]
date.timezone = Asia/Manila

[opcache]
opcache.enable                 = 1
; Disable timestamp validation in production (code never changes at runtime)
opcache.validate_timestamps    = 0
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 10000
opcache.fast_shutdown          = 1
; JIT (PHP 8+ — big speed boost for Laravel)
opcache.jit                    = tracing
opcache.jit_buffer_size        = 64M
