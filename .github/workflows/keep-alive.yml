name: Keep Clinovia Alive (Heartbeat)
# ─────────────────────────────────────────────────────────────────────────────
# Pings Clinovia's /ping endpoint every 10 minutes to prevent Render's free
# tier from putting the service to sleep (Render sleeps after 15 min idle).
#
# This works alongside the Render cron job in render.yaml as a redundant layer.
# GitHub Actions provides 2,000 free minutes/month on public repos.
#
# Setup:
#   1. Set CLINOVIA_URL in your repository secrets (Settings → Secrets → Actions)
#      e.g.  CLINOVIA_URL = https://clinovia.onrender.com
#   2. Push this file — the workflow activates automatically.
#
# The workflow also runs on push to main so you can test it immediately.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 10 minutes — safely below Render's 15-min sleep threshold.
    # GitHub Actions scheduler has ~1-2 min jitter; 10 min is safe.
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Allow manual trigger from the Actions tab
  push:
    branches: [main]  # Test the workflow on deploy

jobs:
  heartbeat:
    name: Ping /ping endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Send heartbeat to Clinovia
        run: |
          # Use the secret URL; fall back to a placeholder for branch pushes.
          TARGET_URL="${{ secrets.CLINOVIA_URL }}"

          if [ -z "$TARGET_URL" ]; then
            echo "⚠️  CLINOVIA_URL secret is not set. Skipping ping."
            echo "   Add it via: Settings → Secrets and variables → Actions → New secret"
            exit 0
          fi

          echo "📡 Pinging: ${TARGET_URL}/ping"

          HTTP_CODE=$(curl -sf \
            --max-time 20 \
            --retry 2 \
            --retry-delay 5 \
            -o /dev/null \
            -w "%{http_code}" \
            "${TARGET_URL}/ping")

          echo "   HTTP status: ${HTTP_CODE}"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Clinovia is alive."
          else
            echo "❌ Unexpected status: ${HTTP_CODE}" >&2
            # Don't fail the workflow — a single missed ping is not critical.
            # Render's own cron provides redundancy.
            exit 0
          fi

      - name: Optional — check /health endpoint
        run: |
          TARGET_URL="${{ secrets.CLINOVIA_URL }}"
          if [ -z "$TARGET_URL" ]; then exit 0; fi

          echo "🩺 Checking: ${TARGET_URL}/health"
          curl -sf --max-time 20 "${TARGET_URL}/health" | python3 -m json.tool || true
